<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>jQuery Student Score Editor</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="data.js"></script>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 30px;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        background-color: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
      }

      h1 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 8px;
      }

      .instruction {
        text-align: center;
        color: #555;
        margin-bottom: 24px;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
      }

      th,
      td {
        border: 1px solid #333;
        padding: 11px 10px;
        text-align: center;
      }

      th {
        background-color: #e9ecef;
      }

      td.name-cell {
        text-align: left;
      }

      td.editable {
        cursor: pointer;
      }

      td.editable:hover {
        background-color: #fff3cd;
      }

      .score-input {
        width: 90%;
        padding: 6px;
        box-sizing: border-box;
        text-align: center;
        border: 2px solid #0d6efd;
        border-radius: 4px;
        outline: none;
      }

      .message {
        margin-top: 15px;
        min-height: 24px;
        text-align: center;
        font-weight: bold;
      }

      .error-message {
        color: red;
      }

      .success-message {
        color: green;
      }

      .grade-a {
        color: #198754;
        font-weight: bold;
      }

      .grade-b {
        color: #0d6efd;
        font-weight: bold;
      }

      .grade-c {
        color: #fd7e14;
        font-weight: bold;
      }

      .grade-d {
        color: #b8860b;
        font-weight: bold;
      }

      .grade-f {
        color: red;
        font-weight: bold;
      }

      @media (max-width: 700px) {
        body {
          padding: 10px;
        }

        .container {
          padding: 15px;
        }

        th,
        td {
          padding: 8px 6px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>jQuery Assignment: Student Score Editor</h1>

      <p class="instruction">
        Click a Midterm or Final score to edit.
        Press <strong>Enter</strong> to save or
        <strong>Escape</strong> to cancel.
      </p>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width: 10%">ID</th>
              <th style="width: 30%">Name</th>
              <th>Midterm</th>
              <th>Final</th>
              <th>Total</th>
              <th>Grade</th>
            </tr>
          </thead>

          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div id="message" class="message"></div>
    </div>

    <script>
      $(document).ready(function () {
        function calculateGrade(total) {
          if (total >= 80) {
            return "A";
          } else if (total >= 70) {
            return "B";
          } else if (total >= 60) {
            return "C";
          } else if (total >= 50) {
            return "D";
          } else {
            return "F";
          }
        }

        function showMessage(text, type) {
          const message = $("#message");

          message
            .removeClass("error-message success-message")
            .addClass(
              type === "error"
                ? "error-message"
                : "success-message"
            )
            .text(text);
        }

        function setGradeStyle(gradeCell, grade) {
          gradeCell.removeClass(
            "grade-a grade-b grade-c grade-d grade-f"
          );

          gradeCell.addClass(
            "grade-" + grade.toLowerCase()
          );
        }

        function createRow(student, index) {
          const total =
            Number(student.midterm) +
            Number(student.final);

          const grade = calculateGrade(total);

          const html = `
            <tr id="row-${index}">
              <td>${student.id}</td>

              <td class="name-cell">
                ${student.name}
              </td>

              <td
                class="midterm editable"
                data-index="${index}"
              >
                ${student.midterm}
              </td>

              <td
                class="final editable"
                data-index="${index}"
              >
                ${student.final}
              </td>

              <td id="total-${index}">
                ${total}
              </td>

              <td
                id="grade-${index}"
                class="grade-${grade.toLowerCase()}"
              >
                ${grade}
              </td>
            </tr>
          `;

          $("#table-body").append(html);
        }

        function updateRow(index) {
          const student = students[index];

          const total =
            Number(student.midterm) +
            Number(student.final);

          const grade = calculateGrade(total);

          $("#total-" + index).text(total);

          const gradeCell = $("#grade-" + index);

          gradeCell.text(grade);

          setGradeStyle(gradeCell, grade);
        }

        for (let i = 0; i < students.length; i++) {
          createRow(students[i], i);
        }

        $(document).on(
          "click",
          ".editable",
          function () {
            const cell = $(this);

            if (cell.find("input").length > 0) {
              return;
            }

            const oldValue = cell.text().trim();
            const index = Number(cell.data("index"));

            const field = cell.hasClass("midterm")
              ? "midterm"
              : "final";

            const input = $(`
              <input
                type="number"
                min="0"
                max="50"
                step="1"
                value="${oldValue}"
                class="score-input"
              >
            `);

            cell.empty().append(input);

            input.focus().select();

            input.on("keydown", function (event) {
              if (event.key === "Enter") {
                event.preventDefault();

                const inputText = $(this).val().trim();
                const newValue = Number(inputText);

                if (
                  inputText === "" ||
                  Number.isNaN(newValue) ||
                  newValue < 0 ||
                  newValue > 50
                ) {
                  cell.text(oldValue);

                  showMessage(
                    "Score must be between 0 and 50.",
                    "error"
                  );

                  return;
                }

                students[index][field] = newValue;

                cell.text(newValue);

                updateRow(index);

                showMessage(
                  "Score updated successfully.",
                  "success"
                );
              } else if (event.key === "Escape") {
                event.preventDefault();

                cell.text(oldValue);

                showMessage(
                  "Editing cancelled.",
                  "error"
                );
              }
            });
          }
        );
      });
    </script>
  </body>
</html>
